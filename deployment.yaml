apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-capstone-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-capstone-app
  template:
    metadata:
      labels:
        app: devops-capstone-app
    spec:
      containers:
      - name: devops-capstone-app
        image: rakeshs53350/devops-capstone-app:latest
        ports:
        - containerPort: 80
